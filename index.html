<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloG UI -Register</title>
    <link rel="stylesheet" href="./assets/styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- google fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <!-- font font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css"
        integrity="sha512-5A8nwdMOWrSz20fDsjczgUidUBR8liPYU+WymTZP1lmY9G6Oc7HlZv156XqnsgNUzTyMefFTcsFH/tnJE/+xBg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="wrapper">
        <!-- left panel -->
        <section class="register">
            <div class="logo">
                <i class="fa fa-layer-group"></i>
                <span class="matn">GloG UI</span>
            </div>
            <form action="javascript:void(0)" class="login-form">
                <div class="input-group">
                    <label for="fullname">Fullname</label>
                    <input type="text" placeholder="farzad asgari" name="fullname" id="fullname">
                </div>
                <div class="input-group">
                    <label for="email adresse">E mail</label>
                    <input type="email" placeholder="farzad-asgari@gmail.com" name="email" id="email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" placeholder="************" name="password" id="password">
                </div>
                <div class="options">
                    <label for="terms" class="remember">
                        <input type="checkbox" name="terms" id="terms">
                        I agree to Terms
                    </label>
                </div>
                <button type="submit" class="register-btn">
                    Create Account
                </button>
            </form>
            <div class="divider">
                <span> or continue with</span>
            </div>
            <div class="socials">
                <button>
                    <i class="fa-brands fa-google"></i>
                    Google
                </button>
                <button>
                    <i class="fa-brands fa-linkedin"></i>
                    LinkedIn
                </button>
                <button>
                    <i class="fa-brands fa-orcid"></i>
                    ORCiD
                </button>
            </div>
            <p class="login-link">Already have an account?
                <a href="javascript:void(0)">Sign In</a>
            </p>
        </section>
        <!-- right panel -->
        <section class="gallery">
            <div class="cart cart1"><img src="assets/image/OIP.webp" alt="">
            </div>
            <div class="cart cart2"><img src="assets/image/560x560.webp" alt="">
            </div>
            <div class="cart cart3"><img src="assets/image/a3095830-a277-11ef-9953-49eac7389dec.webp" alt="">
            </div>
            <div class="cart cart4"><img src="assets/image/ezgif-7cde1b330fcab8dd.webp" alt="">
            </div>
            <div class="cart cart5"><img src="assets/image/ezgif-1600333b20160213.webp" alt="">
            </div>
            <div class="cart cart5"><img src="assets/image/photo4.webp" alt="">
            </div>
            <div class="cart cart5"><img src="assets/image/photo555.webp" alt="">
            </div>

        </section>

    </div>
</body>

</html>
