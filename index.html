<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./assets/styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css"

<body>
    <div class="wrapper">
        <!-- left panel -->
        <section class="register">
            <div class="logo">
                <i class="fa fa-layer-group"></i>
                GloG UI
                <form action="javascript:void(0)">
                    <div class="input-group">
                        <label for="fullname">fullname</label>
                        <input type="text" placeholder="farzad asgari" name="fullname" id="fullname">
                    </div>
                    <div class="input-group">
                        <label for="email adresse">E.mail</label>
                        <input type="e.mail" placeholder="farzad-asgari@gmail.com" name="e.mail" id="e.mail">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" placeholder="************" name="password" id="password">
                    </div>
                    <div class="options">
                        <label for="terms" class="remember">
                            <input type="checkbox" name="terms" id="terms">
                            I agree to Terms
                        </label>
                    </div>
                    <button class="register-btn">
                        creat account
                    </button>
                </form>
                <div class="divider">
                    <span> or continiue with</span>
                </div>
                <div class="socials">
                    <button>
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button>
                        <i class="fa-brands fa-orcid"></i>
                        ORCiD
                    </button>
                </div>
                <p class="login-link">Already have an account
                    <a href="javascript:void(0)">Sign In</a>
                </p>
        </section>
        <!-- right panel -->
        <section class="gallery">
            <div class="cart cart1"><img src="#" alt="">
            </div>
            <div class="cart cart2"><img src="#" alt="">
            </div>
            <div class="cart cart3"><img src="#" alt="">
            </div>
            <div class="cart cart4"><img src="#" alt="">
            </div>
            <div class="cart cart5"><img src="#" alt="">
            </div>

        </section>

    </div>
